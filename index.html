<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoxess | Spatial Wealth Management</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* This makes your image the full background */
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
        }
        
        /* This adds a subtle dark tint over the image so the text is readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        /* This keeps your text above the dark overlay */
        .content {
            position: relative;
            z-index: 2;
            padding: 0 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 12px 0;
            letter-spacing: 6px;
            font-weight: 300;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <div class="content">
        <h1>STOXESS</h1>
        <p>The next generation of 3D spatial wealth management.</p>
    </div>

</body>
</html>
