<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoxess</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Fills the background with black */
            height: 100%;
            /* Allows horizontal scrolling but locks vertical scrolling */
            overflow-x: auto;
            overflow-y: hidden;
            /* Prevents the pull-to-refresh on some mobile browsers from messing up the swipe */
            overscroll-behavior-y: none; 
        }
        
        .splash-image {
            height: 100vh; /* Snaps the image height perfectly to the screen height */
            width: auto;   /* Lets the width scale naturally, creating the scroll */
            display: block;
        }
    </style>
</head>
<body>

    <img src="logo.jpg" alt="Stoxess" class="splash-image">

</body>
</html>
